<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деловой этикет в Казахстане</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <div class="sidebar-overlay"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">Этикет</div>
            <div class="sidebar-icons">
                <button class="sidebar-icon-btn" id="contacts-btn" title="Контакты">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22 6 12 13 2 6"/>
                    </svg>
                </button>
                <button class="sidebar-icon-btn" id="theme-toggle" title="Переключить тему">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                    </svg>
                </button>
                <button class="sidebar-icon-btn" id="close-sidebar" title="Закрыть меню">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="sidebar-search">
            <div class="search-input-wrapper">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
                <input type="text" class="search-input" placeholder="Поиск по названию..." id="sidebar-search">
            </div>
        </div>

        <div class="sidebar-content">
            <!-- Меню загрузится через index.js -->
        </div>
    </aside>

    <div class="contacts-menu">
        <div class="contacts-header">
            <span class="contacts-title">Контакты</span>
            <button class="contacts-close-btn" id="contacts-close-btn">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="contacts-content">
            <!-- Контакты загрузятся через index.js -->
        </div>
    </div>

    <section class="hero">
        <div class="content">
            <div class="accent-line"></div>
            <h1>Деловой этикет в Казахстане</h1>
            <p class="subtitle">Введение в профессиональную культуру и деловые отношения</p>
        </div>
    </section>

    <nav class="bottom-nav">
        <div class="nav-container">
            <button class="nav-btn active" id="open-sidebar-btn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <span>Содержание</span>
            </button>
            <button class="nav-btn" id="search-btn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <span>Поиск</span>
            </button>
        </div>
    </nav>

    <script src="scripts/path.js"></script>
    <script type="module" src="scripts/index.js"></script>
    <script type="module" src="scripts/search.js"></script>
</body>
</html>
